name: WindowFinder

options:
  bundleIdPrefix: com.joqnorandev
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: "7"
    # Use a stable signing identity so Accessibility permission is not reset on each build.
    DEVELOPMENT_TEAM: "M9WZ5FY286"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Development: joqran1221@gmail.com (XR2QN2582N)"
    PROVISIONING_PROFILE_SPECIFIER: ""
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  WindowFinder:
    type: application
    platform: macOS
    sources:
      - path: WindowFinder
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joqnorandev.WindowFinder
        PRODUCT_NAME: WindowFinder
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: WindowFinder/Info.plist
      properties:
        CFBundleName: WindowFinder
        CFBundleDisplayName: Window Finder
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        # Menu bar agent without a Dock icon.
        LSUIElement: true
        NSHumanReadableCopyright: ""
        # Base permission descriptions. Localized strings live in InfoPlist.strings.
        NSAccessibilityUsageDescription: "Window Finder uses Accessibility permission to list windows from other apps and bring them to the front."
        NSScreenCaptureUsageDescription: "Window Finder uses Screen Recording permission to show window thumbnails."
        # Sparkle automatic updates.
        SUFeedURL: "https://raw.githubusercontent.com/maeda-niku18/WindowFinder/main/appcast.xml"
        SUPublicEDKey: "9MgijyjAKx0ZGzzmMEw8erOluTmoLQmHQCrAFRO6yC8="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
